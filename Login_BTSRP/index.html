<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page Bootstrap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ephesis&family=Fredericka+the+Great&family=Honk:MORF@20&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=MonteCarlo&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans+Linear+A&family=Roboto:ital,wght@0,100..900;1,100..900&family=Shizuru&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <!--import bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body class="bg-light">

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-4">

                <div class="card">

                    <div class="card-body">

                        <h1 class="text-center mt-5 text-align-center text-dark">Esegui l accesso.</h1>

                    </div>
                    

                    <div class="mb-3">

                        <label for="form-label">
                            Username : 
                        </label>

                        <input type="text" id="username" class="form-control">
                    </div>

                    <div class="mb-3">

                        <label for="form-label">
                            Password : 
                        </label>

                        <input type="password" id="password" class="form-control">
                    </div>


                    <button onclick="login()" class="btn btn-dark w-100">
                        Accedi
                    </button>

                    <!--output-->
                    <p id="errore" class="text-danger"></p>

                </div>
            </div>

        </div>

        

    </div>
    









    <script src="main.js"></script>
</body>
</html>
