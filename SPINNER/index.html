<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinner Pedro</title>
    <!--Importare link di Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!--Font Awesome Icon-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    
    <!--Importazione style personale (deve stare sotto a bootstrap!!)-->
    <link rel="stylesheet" href="style.css">

     <!--Font Awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    

    <div class="container text-center d-flex flex-column justify-content-center align-items-center vh-100">

        <h1 class="text-center text-dark"><i class="fa-solid fa-otter"></i>Spinner</h1>

        <!--Immagine spinner-->
        <div class="rotondo">

            <img id="immagine" src="./img/raccoon.webp" alt="">

        </div>



        <!--Bottoni-->
        <div>

            <button id="startBtn" class="btn btn_pers">
                
                <span role="status" id="spinner" class="spinner-border spinner-border-sm d-none "> </span>
                <i class="fa-solid fa-play"></i>
                
                Play</button>


            <button id="stopBtn" class="btn btn_pers2">Stop</button>

        </div>

        <audio id="musica" src="./audio/pedro-pedro-p.mp3"></audio>


    </div>






    <!-- Importare script Javascript di Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="main.js"></script>
</body>
</html>
