<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <!--Importare link di Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!--Font Awesome Icon-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    
    <link rel="stylesheet" href="style.css">
    <title>Form registro Studenti</title>
</head>
<body>


    <div class="container py-5">

        <h1 class="text-center mb-4">Registro Studenti</h1>

        <div class="card shadow mb-4">

            <div class="card-header bg-primary text-white">
                Inserisci Studente
            </div>

            <div class="card-body">
                <div class="row g-3">

                    <div class="col-md-6">
                        <label for="form-label">Nome</label>
                        <input type="text" id="nome" class="form-control" placeholder="Inserisci nome...">
                    </div>

                     <div class="col-md-6">
                        <label for="form-label">Cognome</label>
                        <input type="text" id="cognome" class="form-control" placeholder="Inserisci cognome...">
                    </div>

                     <div class="col-md-6">
                        <label for="form-label">Età</label>
                        <input type="number" id="eta" min="0" max="100" class="form-control" placeholder="Inserisci l età...">
                    </div>

                     <div class="col-md-6">
                        <label for="form-label">Voto</label>
                        <input type="number" id="voto" min="0" max="10" class="form-control" placeholder="Inserisci il voto dello studente...">
                    </div>

                     <div class="col-md-6">
                        <label for="form-label">Primo sport</label>
                        <input type="text" id="sport1" class="form-control" placeholder="Inserisci primo sport...">
                    </div>

                     <div class="col-md-6">
                        <label for="form-label">Secondo Sport</label>
                        <input type="text" id="sport2" class="form-control" placeholder="Inserisci secondo sport...">
                    </div>
                </div>

                <div class="mt-4">
                    <button class="btn btn-success" onclick="aggiungiStudente()" >Aggiungi studente</button>
                </div>
            </div>
        </div>



        <div class="card shadow mb-4">

            <div class="card-header bg-dark text-white">
                Azioni
            </div>

            <div class="card-body m-2 gap-2 align-content-center d-flex justify-content-center">

                <button class="btn btn-primary" onclick="mostraStudenti()">Mostra studenti</button>
                <button class="btn btn-warning" onclick="calcolaMedia()">Calcola Media</button>
                <button class="btn btn-secondary" onclick="mostraPrimoStudente()">Mostra 1°studente</button>


                

            </div>


        </div>






        <div class="card shadow">
            <div class="card-header">
                Risultato

            </div>

            <div class="card-body">
                <div id="risultato">
                    Nessun risultato da mostrare.
                </div>

            </div>

        </div>



    </div>





    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="main.js"></script>
</body>
</html>
